/* ── reveal helper ── */
function Reveal({ children, delay = '' }) {
  const ref = useRef(null);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([entry]) => {
      if (entry.isIntersecting) { el.classList.add('in'); if (delay) el.classList.add(delay); obs.disconnect(); }
    }, { threshold: 0.12 });
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return e('div', { ref, className: 'reveal' + (delay ? ' ' + delay : '') }, children);
}
