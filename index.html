<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Startup Accountancy — Get your books set up right, in one session</title>
  <link rel="stylesheet" href="colors_and_type.css" />
  <style>
    html, body { margin: 0; padding: 0; }
    body { background: var(--surface); overflow-x: hidden; }
    a { text-decoration: none; }
    *:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; border-radius: 4px; }
    @media (max-width: 960px) {
      section > div[style*="grid-template-columns"] { grid-template-columns: 1fr !important; }
    }
  </style>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Button.jsx"></script>
  <script type="text/babel" src="components/Nav.jsx"></script>
  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/SocialProof.jsx"></script>
  <script type="text/babel" src="components/ProblemMechanism.jsx"></script>
  <script type="text/babel" src="components/HowItWorks.jsx"></script>
  <script type="text/babel" src="components/Objections.jsx"></script>
  <script type="text/babel" src="components/Founders.jsx"></script>
  <script type="text/babel" src="components/FinalCTA.jsx"></script>
  <script type="text/babel" src="components/Footer.jsx"></script>

  <script type="text/babel">
    const { useEffect } = React;

    function App() {
      useEffect(() => {
        const hydrate = () => window.lucide && window.lucide.createIcons();
        hydrate();
        const obs = new MutationObserver(hydrate);
        obs.observe(document.body, { childList: true, subtree: true });
        return () => obs.disconnect();
      }, []);

      return (
        <div>
          <Nav />
          <Hero />
          <SocialProof />
          <ProblemMechanism />
          <HowItWorks />
          <Objections />
          <Founders />
          <FinalCTA />
          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
